<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }

      #msg {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }

      #btnChange {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10;
        background: white;
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="msg">Escanea el target...</div>
    <button id="btnChange">Cambiar modelo</button>

    <a-scene
      mindar-image="imageTargetSrc: ./gato.mind; autoStart: true; uiScanning: true; uiLoading: true; uiError: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="model1" src="./silbon.glb"></a-asset-item>
        <a-asset-item id="model2" src="./raton.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" intensity="1" position="1 2 1"></a-light>

      <a-entity id="targetAnchor" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="car1"
          src="#model1"
          position="0 0 0"
          rotation="0 0 0"
          scale="5 5 5"
          visible="true"
        ></a-gltf-model>

        <a-gltf-model
          id="car2"
          src="#model2"
          position="0 0 0"
          rotation="0 0 0"
          scale="5 5 5"
          visible="false"
        ></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const anchor = document.querySelector("#targetAnchor");
      const car1 = document.querySelector("#car1");
      const car2 = document.querySelector("#car2");
      const btnChange = document.querySelector("#btnChange");
      const msg = document.querySelector("#msg");

      let showingFirst = true;
      let targetVisible = false;

      anchor.addEventListener("targetFound", () => {
        targetVisible = true;
        msg.textContent = "Target detectado";
      });

      anchor.addEventListener("targetLost", () => {
        targetVisible = false;
        msg.textContent = "Target perdido";
      });

      btnChange.addEventListener("click", () => {
        if (!targetVisible) {
          msg.textContent = "Primero escanea el target";
          return;
        }

        showingFirst = !showingFirst;

        car1.setAttribute("visible", showingFirst);
        car2.setAttribute("visible", !showingFirst);

        msg.textContent = showingFirst ? "Modelo 1 activo" : "Modelo 2 activo";
      });
    </script>
  </body>
</html>
