<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }

      #msg {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div id="msg">Escanea el target...</div>

    <a-scene
      mindar-image="imageTargetSrc: ./target.mind; autoStart: true; uiScanning: true; uiLoading: true; uiError: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Anchor que sigue al target -->
      <a-entity id="targetAnchor" mindar-image-target="targetIndex: 0">
        <a-box
          id="trackedCube"
          position="0 0 0"
          depth="0.3"
          height="0.3"
          width="0.3"
          color="red"
        ></a-box>
      </a-entity>

      <!-- Cubo congelado, independiente del target -->
      <a-box
        id="frozenCube"
        position="0 0 0"
        depth="0.3"
        height="0.3"
        width="0.3"
        color="blue"
        visible="false"
      ></a-box>
    </a-scene>

    <script>
      const anchor = document.querySelector("#targetAnchor");
      const trackedCube = document.querySelector("#trackedCube");
      const frozenCube = document.querySelector("#frozenCube");
      const msg = document.querySelector("#msg");

      let alreadyFrozen = false;

      anchor.addEventListener("targetFound", () => {
        msg.textContent = "Target detectado";

        if (alreadyFrozen) return;

        // Esperamos un poquito para que la pose se estabilice
        setTimeout(() => {
          anchor.object3D.updateMatrixWorld(true);

          const worldPos = new THREE.Vector3();
          const worldQuat = new THREE.Quaternion();
          const worldScale = new THREE.Vector3();

          trackedCube.object3D.getWorldPosition(worldPos);
          trackedCube.object3D.getWorldQuaternion(worldQuat);
          trackedCube.object3D.getWorldScale(worldScale);

          frozenCube.object3D.position.copy(worldPos);
          frozenCube.object3D.quaternion.copy(worldQuat);
          frozenCube.object3D.scale.copy(worldScale);
          frozenCube.setAttribute("visible", true);

          // Ocultamos el cubo ligado al target
          trackedCube.setAttribute("visible", false);

          alreadyFrozen = true;
          msg.textContent = "Cubo fijado";
        }, 300);
      });

      anchor.addEventListener("targetLost", () => {
        if (!alreadyFrozen) {
          msg.textContent = "Target perdido";
        } else {
          msg.textContent = "Cubo sigue visible";
        }
      });
    </script>
  </body>
</html>
