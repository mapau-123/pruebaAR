<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }

      #msg {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }

      #btnReset {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10;
        background: white;
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="msg">Escanea el target...</div>
    <button id="btnReset">Desanclar</button>

    <a-scene
      mindar-image="imageTargetSrc: ./target.mind; autoStart: true; uiScanning: true; uiLoading: true; uiError: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="carModel" src="./modcarro.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" intensity="1" position="1 2 1"></a-light>

      <!-- Modelo ligado al target -->
      <a-entity id="targetAnchor" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="trackedCar"
          src="#carModel"
          position="0 0 0"
          rotation="0 0 0"
          scale="5 5 5"
        ></a-gltf-model>
      </a-entity>

      <!-- Wrapper congelado -->
      <a-entity id="frozenWrapper" visible="false">
        <a-gltf-model
          id="frozenCar"
          src="#carModel"
          position="0 0 0"
          rotation="0 0 0"
          scale="5 5 5"
        ></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const anchor = document.querySelector("#targetAnchor");
      const trackedCar = document.querySelector("#trackedCar");
      const frozenWrapper = document.querySelector("#frozenWrapper");
      const frozenCar = document.querySelector("#frozenCar");
      const msg = document.querySelector("#msg");
      const btnReset = document.querySelector("#btnReset");

      let alreadyFrozen = false;
      let freezeTimeout = null;

      // =========================
      // ANCLAR / CONGELAR
      // =========================
      anchor.addEventListener("targetFound", () => {
        if (alreadyFrozen) return;

        msg.textContent = "Target detectado";

        clearTimeout(freezeTimeout);
        freezeTimeout = setTimeout(() => {
          if (alreadyFrozen) return;

          anchor.object3D.updateMatrixWorld(true);
          trackedCar.object3D.updateMatrixWorld(true);

          const worldPos = new THREE.Vector3();
          const worldQuat = new THREE.Quaternion();

          trackedCar.object3D.getWorldPosition(worldPos);
          trackedCar.object3D.getWorldQuaternion(worldQuat);

          frozenWrapper.object3D.position.copy(worldPos);
          frozenWrapper.object3D.quaternion.copy(worldQuat);

          // El modelo dentro del wrapper conserva escala local
          frozenCar.object3D.position.set(0, 0, 0);
          frozenCar.object3D.rotation.set(0, 0, 0);
          frozenCar.object3D.scale.set(5, 5, 5);

          frozenWrapper.setAttribute("visible", true);
          trackedCar.setAttribute("visible", false);

          alreadyFrozen = true;
          msg.textContent = "Carro fijado. Usa dos dedos para zoom.";
        }, 300);
      });

      anchor.addEventListener("targetLost", () => {
        if (!alreadyFrozen) {
          msg.textContent = "Target perdido";
        } else {
          msg.textContent = "Carro sigue visible";
        }
      });

      btnReset.addEventListener("click", () => {
        clearTimeout(freezeTimeout);

        alreadyFrozen = false;

        frozenWrapper.setAttribute("visible", false);
        trackedCar.setAttribute("visible", true);

        frozenWrapper.object3D.position.set(0, 0, 0);
        frozenWrapper.object3D.rotation.set(0, 0, 0);
        frozenWrapper.object3D.scale.set(1, 1, 1);

        frozenCar.object3D.position.set(0, 0, 0);
        frozenCar.object3D.rotation.set(0, 0, 0);
        frozenCar.object3D.scale.set(5, 5, 5);

        msg.textContent = "Escanea el target de nuevo";
      });

      // =========================
      // ZOOM CON DOS DEDOS
      // =========================
      let pinchStartDistance = 0;
      let pinchStartScale = 5;

      function getDistance(t1, t2) {
        const dx = t2.clientX - t1.clientX;
        const dy = t2.clientY - t1.clientY;
        return Math.hypot(dx, dy);
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      window.addEventListener("touchstart", (e) => {
        if (!alreadyFrozen) return;
        if (!frozenWrapper.getAttribute("visible")) return;

        if (e.touches.length === 2) {
          pinchStartDistance = getDistance(e.touches[0], e.touches[1]);
          pinchStartScale = frozenCar.object3D.scale.x;
        }
      }, { passive: false });

      window.addEventListener("touchmove", (e) => {
        if (!alreadyFrozen) return;
        if (!frozenWrapper.getAttribute("visible")) return;
        if (e.touches.length !== 2) return;

        e.preventDefault();

        const currentDistance = getDistance(e.touches[0], e.touches[1]);
        if (!pinchStartDistance) return;

        const ratio = currentDistance / pinchStartDistance;
        const newScale = clamp(pinchStartScale * ratio, 1, 20);

        frozenCar.object3D.scale.set(newScale, newScale, newScale);
      }, { passive: false });

      window.addEventListener("touchend", () => {
        pinchStartDistance = 0;
      });

      window.addEventListener("touchcancel", () => {
        pinchStartDistance = 0;
      });
    </script>
  </body>
</html>
