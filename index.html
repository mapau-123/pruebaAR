<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }

      #msg {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }

      #btnReset {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10;
        background: white;
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="msg">Escanea el target...</div>
    <button id="btnReset">Desanclar</button>

    <a-scene
      mindar-image="imageTargetSrc: ./target.mind; autoStart: true; uiScanning: true; uiLoading: true; uiError: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="carModel" src="./modcarro.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" intensity="1" position="1 2 1"></a-light>

      <!-- Modelo ligado al target -->
      <a-entity id="targetAnchor" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="trackedCar"
          src="#carModel"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
        ></a-gltf-model>
      </a-entity>

      <!-- Modelo congelado -->
      <a-gltf-model
        id="frozenCar"
        src="#carModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1"
        visible="false"
        pinch-scale="min: 0.3; max: 8; speed: 0.01"
      ></a-gltf-model>
    </a-scene>

    <script>
      AFRAME.registerComponent("pinch-scale", {
        schema: {
          min: { type: "number", default: 0.3 },
          max: { type: "number", default: 8 },
          speed: { type: "number", default: 0.01 }
        },

        init: function () {
          this.pointers = new Map();
          this.startDistance = 0;
          this.startScale = null;

          this.onTouchStart = this.onTouchStart.bind(this);
          this.onTouchMove = this.onTouchMove.bind(this);
          this.onTouchEnd = this.onTouchEnd.bind(this);

          window.addEventListener("touchstart", this.onTouchStart, { passive: false });
          window.addEventListener("touchmove", this.onTouchMove, { passive: false });
          window.addEventListener("touchend", this.onTouchEnd, { passive: false });
          window.addEventListener("touchcancel", this.onTouchEnd, { passive: false });
        },

        remove: function () {
          window.removeEventListener("touchstart", this.onTouchStart);
          window.removeEventListener("touchmove", this.onTouchMove);
          window.removeEventListener("touchend", this.onTouchEnd);
          window.removeEventListener("touchcancel", this.onTouchEnd);
        },

        getDistance: function (t1, t2) {
          const dx = t2.clientX - t1.clientX;
          const dy = t2.clientY - t1.clientY;
          return Math.hypot(dx, dy);
        },

        clamp: function (v, min, max) {
          return Math.max(min, Math.min(max, v));
        },

        onTouchStart: function (e) {
          if (!this.el.getAttribute("visible")) return;

          if (e.touches.length === 2) {
            const t1 = e.touches[0];
            const t2 = e.touches[1];

            this.startDistance = this.getDistance(t1, t2);

            const s = this.el.getAttribute("scale");
            this.startScale = { x: s.x, y: s.y, z: s.z };
          }
        },

        onTouchMove: function (e) {
          if (!this.el.getAttribute("visible")) return;
          if (e.touches.length !== 2) return;

          e.preventDefault();

          const t1 = e.touches[0];
          const t2 = e.touches[1];
          const currentDistance = this.getDistance(t1, t2);

          if (!this.startDistance || !this.startScale) return;

          const delta = (currentDistance - this.startDistance) * this.data.speed;

          const newX = this.clamp(this.startScale.x + delta, this.data.min, this.data.max);
          const newY = this.clamp(this.startScale.y + delta, this.data.min, this.data.max);
          const newZ = this.clamp(this.startScale.z + delta, this.data.min, this.data.max);

          this.el.setAttribute("scale", `${newX} ${newY} ${newZ}`);
        },

        onTouchEnd: function (e) {
          if (e.touches.length < 2) {
            this.startDistance = 0;
            this.startScale = null;
          }
        }
      });

      const anchor = document.querySelector("#targetAnchor");
      const trackedCar = document.querySelector("#trackedCar");
      const frozenCar = document.querySelector("#frozenCar");
      const msg = document.querySelector("#msg");
      const btnReset = document.querySelector("#btnReset");

      let alreadyFrozen = false;
      let freezeTimeout = null;

      anchor.addEventListener("targetFound", () => {
        if (alreadyFrozen) return;

        msg.textContent = "Target detectado";

        clearTimeout(freezeTimeout);
        freezeTimeout = setTimeout(() => {
          if (alreadyFrozen) return;

          anchor.object3D.updateMatrixWorld(true);
          trackedCar.object3D.updateMatrixWorld(true);

          const worldPos = new THREE.Vector3();
          const worldQuat = new THREE.Quaternion();
          const worldScale = new THREE.Vector3();

          trackedCar.object3D.getWorldPosition(worldPos);
          trackedCar.object3D.getWorldQuaternion(worldQuat);
          trackedCar.object3D.getWorldScale(worldScale);

          frozenCar.object3D.position.copy(worldPos);
          frozenCar.object3D.quaternion.copy(worldQuat);
          frozenCar.object3D.scale.copy(worldScale);
          frozenCar.setAttribute("visible", true);

          trackedCar.setAttribute("visible", false);

          alreadyFrozen = true;
          msg.textContent = "Carro fijado. Usa dos dedos para zoom.";
        }, 300);
      });

      anchor.addEventListener("targetLost", () => {
        if (!alreadyFrozen) {
          msg.textContent = "Target perdido";
        } else {
          msg.textContent = "Carro sigue visible";
        }
      });

      btnReset.addEventListener("click", () => {
        clearTimeout(freezeTimeout);

        alreadyFrozen = false;

        frozenCar.setAttribute("visible", false);
        trackedCar.setAttribute("visible", true);

        frozenCar.object3D.position.set(0, 0, 0);
        frozenCar.object3D.rotation.set(0, 0, 0);
        frozenCar.object3D.scale.set(1, 1, 1);

        msg.textContent = "Escanea el target de nuevo";
      });
    </script>
  </body>
</html>
